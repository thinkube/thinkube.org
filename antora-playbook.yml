# Antora playbook for the Thinkube documentation site.
# Base path per deploy target is set via the `--url` CLI flag, NOT here:
#   cluster (default):  antora antora-playbook.yml            -> base "/"
#   GitHub Pages (SL-6): antora --url /thinkube.org/ ...      -> base "/thinkube.org/"
site:
  title: Thinkube
  start_page: thinkube-docs::index.adoc
  url: /

content:
  sources:
    - url: .
      branches: HEAD
      start_path: .
    # Multi-repo / docs-with-code: the Get Started guide lives in the installer
    # repo that performs the install, and Antora aggregates it here at build
    # time. The installer repo is public, so the cluster build fetches it too.
    - url: https://github.com/thinkube/thinkube-installer.git
      branches: main
      start_path: docs
    # docs-with-code (TEP-tgh6iy): thinkube-control's docs live in its own repo,
    # beside the control-plane code they describe, and aggregate here at build time.
    - url: https://github.com/thinkube/thinkube-control.git
      branches: main
      start_path: docs

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files: ./supplemental-ui

asciidoc:
  extensions:
    - asciidoctor-kroki
  attributes:
    # d2 diagrams are rendered via a Kroki server and fetched at BUILD time so
    # the published site embeds the image and needs no runtime Kroki access.
    kroki-server-url: https://kroki.io
    kroki-fetch-diagram: true
    kroki-default-format: svg

output:
  dir: ./build/site

antora:
  extensions:
    - require: '@antora/lunr-extension'
      index_latest_only: true

runtime:
  fetch: true
  log:
    failure_level: warn
