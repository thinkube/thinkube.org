# Antora playbook for the Thinkube documentation site.
# Base path per deploy target is set via the `--url` CLI flag, NOT here:
#   cluster (default):  antora antora-playbook.yml            -> base "/"
#   GitHub Pages (SL-6): antora --url /thinkube.org/ ...      -> base "/thinkube.org/"
site:
  title: Thinkube
  start_page: thinkube-docs::index.adoc
  url: /

content:
  sources:
    - url: .
      branches: HEAD
      start_path: .
      # "Edit this Page" -> GitHub (source is local, so the base is explicit)
      edit_url: 'https://github.com/thinkube/thinkube.org/edit/main/{path}'

ui:
  bundle:
    url: https://gitlab.com/antora/antora-ui-default/-/jobs/artifacts/HEAD/raw/build/ui-bundle.zip?job=bundle-stable
    snapshot: true
  supplemental_files: ./supplemental-ui

asciidoc:
  extensions:
    - asciidoctor-kroki
  attributes:
    # d2 diagrams are rendered via a Kroki server and fetched at BUILD time so
    # the published site embeds the image and needs no runtime Kroki access.
    kroki-server-url: https://kroki.io
    kroki-fetch-diagram: true
    kroki-default-format: svg

output:
  dir: ./build/site

antora:
  extensions:
    - require: '@antora/lunr-extension'
      index_latest_only: true

runtime:
  fetch: true
  log:
    failure_level: warn
