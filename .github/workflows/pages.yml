name: Deploy to GitHub Pages

# ── MANUAL-ONLY until announce ────────────────────────────────────────────────
# The product is not yet announced, so this workflow NEVER runs automatically.
# It builds + publishes only when triggered by hand (Actions tab → Run workflow).
#
# ANNOUNCE-TIME SWITCH: to auto-publish on every push to main, uncomment the
# three `push:` lines below. That single change is the only switch needed.
on:
  workflow_dispatch:
  # push:
  #   branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # GitHub Pages serves this repo under the /thinkube.org/ path, so build
      # with that base via Antora's --url flag (the cluster build uses "/").
      - name: Build Antora site (base /thinkube.org/)
        run: npx antora --fetch --url /thinkube.org antora-playbook.yml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
